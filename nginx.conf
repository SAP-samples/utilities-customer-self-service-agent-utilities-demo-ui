server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /dssa API calls to the auth backend (token injection + forwarding)
    location /dssa/ {
        proxy_pass http://auth-backend:3001/dssa/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Forward SSE / streaming responses without buffering
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
    }

    # Proxy /config to auth-backend so user list is driven by env vars
    location = /config {
        proxy_pass http://auth-backend:3001/config;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Serve /user-api/currentUser directly from bundled currentUser.json
    location = /user-api/currentUser {
        default_type application/json;
        try_files /currentUser.json =404;
    }

    # All other requests – serve the SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
