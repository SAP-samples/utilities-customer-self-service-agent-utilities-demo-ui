# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: com.sap.utl.ai.ui.dssa
type: application
server:
  customMiddleware:
  - name: local-mock
    beforeMiddleware: compression
    mountPath: /dssa/ask
    configuration:
      debug: true
  - name: fiori-tools-servestatic
    afterMiddleware: compression
    configuration:
      paths:
        - path: /user-api/currentUser
          src: webapp\\test\\mock\\user.json
  - name: sap-fe-mockserver
    beforeMiddleware: csp
    configuration:
      mountPath: /
      services:
        - urlPath: /TestCase
          metadataPath: ./webapp/test/mock/testCase/metadata.xml
          mockdataPath: ./webapp/test/mock/testCase
          generateMockData: true
      annotations: []
---
# Custom middleware extension as part of your project
specVersion: "3.1"
kind: extension
type: server-middleware
metadata:
  name: local-mock
middleware:
  path: webapp/test/mock/mw-mock.js